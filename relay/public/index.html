<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SuperTesla AA</title>
    <link rel="stylesheet" href="/style.css">
    <script>
        // SPA Router: detect room code in URL path
        (function() {
            var path = location.pathname.replace(/^\//, '').replace(/\/$/, '');
            // If path looks like a room code (3-8 alphanumeric chars), load the player
            if (path && /^[a-z0-9]{3,8}$/.test(path)) {
                window.SUPERTESLA_ROOM = path;
            }
        })();
    </script>
</head>
<body>
    <div id="app">
        <!-- Player UI (hidden until room is set) -->
        <div id="video-container">
            <video id="player-video" autoplay playsinline muted style="display:none"></video>
            <canvas id="player-canvas" width="1280" height="720" style="display:none"></canvas>
            <div id="touchpad"></div>
        </div>

        <div id="status-overlay">
            <div id="status-dot"></div>
            <span id="status-text">Initializing...</span>
        </div>

        <!-- Landing page (shown when no room code in URL) -->
        <div id="landing" style="display:none">
            <div style="max-width:400px;margin:0 auto;padding:40px 20px;text-align:center">
                <h1 style="color:#4fc3f7;font-weight:300;font-size:28px;margin-bottom:8px">SuperTesla</h1>
                <p style="color:#888;font-size:14px;margin-bottom:40px">Android Auto for Tesla</p>

                <div style="margin-bottom:32px">
                    <p style="color:#aaa;font-size:13px;margin-bottom:12px">Enter pairing code from your phone</p>
                    <input id="pair-code" type="text" inputmode="numeric" maxlength="4" placeholder="0000"
                        style="font-size:32px;text-align:center;width:160px;padding:12px;border:2px solid #333;border-radius:12px;background:#1a1a1a;color:#fff;letter-spacing:8px;outline:none">
                    <br>
                    <button id="pair-btn" onclick="doPair()"
                        style="margin-top:16px;padding:12px 40px;background:#4fc3f7;color:#111;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer">
                        Connect
                    </button>
                    <p id="pair-error" style="color:#f44336;font-size:13px;margin-top:8px;display:none"></p>
                </div>

                <div style="border-top:1px solid #333;padding-top:24px">
                    <p style="color:#666;font-size:12px">Or enter your room URL directly:<br>
                    <code style="color:#888">play.supertesla.com/<strong>your-code</strong></code></p>
                </div>
            </div>
        </div>

        <!-- Splash (shown while connecting to relay) -->
        <div id="splash">
            <h1>SuperTesla Android Auto</h1>
            <p>Connecting to phone...</p>
            <p style="font-size:12px;color:#888" id="connection-info"></p>
        </div>
    </div>

    <script>
        // Determine relay host — same origin for the WebSocket relay
        window.SUPERTESLA_RELAY_HOST = location.host;

        // Pairing code lookup
        function doPair() {
            var code = document.getElementById('pair-code').value.trim();
            var errEl = document.getElementById('pair-error');
            errEl.style.display = 'none';
            if (code.length !== 4) { errEl.textContent = 'Enter 4-digit code'; errEl.style.display = 'block'; return; }

            fetch('/api/pair/lookup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: code })
            })
            .then(function(r) { if (!r.ok) throw new Error('Invalid code'); return r.json(); })
            .then(function(data) {
                // Redirect to room with key
                location.href = '/' + data.room + '?k=' + encodeURIComponent(data.key);
            })
            .catch(function(e) {
                errEl.textContent = e.message || 'Invalid or expired code';
                errEl.style.display = 'block';
            });
        }

        // Enter key submits pairing code
        document.getElementById('pair-code').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') doPair();
        });

        // Route: show landing or player
        if (window.SUPERTESLA_ROOM) {
            // Room code in URL — show player
            document.getElementById('landing').style.display = 'none';
        } else {
            // No room — show landing page
            document.getElementById('landing').style.display = 'flex';
            document.getElementById('landing').style.height = '100%';
            document.getElementById('landing').style.alignItems = 'center';
            document.getElementById('landing').style.justifyContent = 'center';
            document.getElementById('splash').style.display = 'none';
        }
    </script>
    <script src="/touch.js"></script>
    <script src="/audio.js"></script>
    <script src="/player.js"></script>
</body>
</html>

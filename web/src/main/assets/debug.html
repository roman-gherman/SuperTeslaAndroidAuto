<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SuperTesla AA - Diagnostics</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, monospace; background: #111; color: #eee; padding: 16px; }
        h1 { font-size: 18px; color: #4fc3f7; margin-bottom: 16px; }
        h2 { font-size: 14px; color: #888; margin: 16px 0 8px; text-transform: uppercase; letter-spacing: 1px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: #1e1e1e; border-radius: 8px; padding: 12px; }
        .label { font-size: 11px; color: #888; }
        .value { font-size: 16px; font-weight: bold; margin-top: 2px; }
        .ok { color: #4caf50; }
        .warn { color: #ffeb3b; }
        .err { color: #f44336; }
        .log { background: #1a1a1a; border-radius: 8px; padding: 12px; font-size: 12px;
                max-height: 200px; overflow-y: auto; margin-top: 8px; }
        .log-entry { padding: 2px 0; border-bottom: 1px solid #222; }
        a { color: #4fc3f7; }
    </style>
</head>
<body>
    <h1>SuperTesla AA - Diagnostics</h1>
    <p><a href="/">&larr; Back to player</a></p>

    <h2>Server</h2>
    <div class="grid">
        <div class="card"><div class="label">Status</div><div class="value" id="srv-status">--</div></div>
        <div class="card"><div class="label">Version</div><div class="value" id="srv-version">--</div></div>
        <div class="card"><div class="label">Video Clients</div><div class="value" id="srv-clients">--</div></div>
        <div class="card"><div class="label">Frames Sent</div><div class="value" id="srv-frames">--</div></div>
    </div>

    <h2>WebRTC</h2>
    <div class="grid">
        <div class="card"><div class="label">State</div><div class="value" id="rtc-state">--</div></div>
        <div class="card"><div class="label">Initialized</div><div class="value" id="rtc-init">--</div></div>
    </div>

    <h2>Browser</h2>
    <div class="grid">
        <div class="card"><div class="label">Mode</div><div class="value" id="br-mode">--</div></div>
        <div class="card"><div class="label">Buffered (s)</div><div class="value" id="br-buffer">--</div></div>
        <div class="card"><div class="label">Queue Size</div><div class="value" id="br-queue">--</div></div>
        <div class="card"><div class="label">User Agent</div><div class="value" id="br-ua" style="font-size:10px;word-break:break-all;">--</div></div>
    </div>

    <h2>Touch Events (last 10)</h2>
    <div class="log" id="touch-log"><i>No events yet</i></div>

    <script>
        function $(id) { return document.getElementById(id); }

        function refresh() {
            fetch('/status').then(function(r) { return r.json(); }).then(function(d) {
                $('srv-status').textContent = d.status || '--';
                $('srv-status').className = 'value ok';
                $('srv-version').textContent = d.version || '--';
                $('srv-clients').textContent = d.videoClients || 0;
                $('srv-frames').textContent = d.framesSent || 0;
            }).catch(function() {
                $('srv-status').textContent = 'offline';
                $('srv-status').className = 'value err';
            });

            fetch('/webrtc/status').then(function(r) { return r.json(); }).then(function(d) {
                $('rtc-state').textContent = d.webrtc || '--';
                $('rtc-state').className = 'value ' + (d.webrtc === 'connected' ? 'ok' : '');
                $('rtc-init').textContent = d.initialized ? 'Yes' : 'No';
            }).catch(function() {
                $('rtc-state').textContent = 'n/a';
            });

            // Browser stats from player
            if (window.opener && window.opener.SuperTeslaPlayer) {
                var p = window.opener.SuperTeslaPlayer;
                $('br-mode').textContent = p.getMode ? p.getMode() : '--';
                $('br-queue').textContent = p.getQueueSize ? p.getQueueSize() : '--';
                var buf = p.getBuffered ? p.getBuffered() : null;
                $('br-buffer').textContent = buf ? (buf.end - buf.start).toFixed(1) : '--';
            } else {
                $('br-mode').textContent = 'n/a (open from player)';
            }

            $('br-ua').textContent = navigator.userAgent;
        }

        refresh();
        setInterval(refresh, 2000);
    </script>
</body>
</html>
